<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>E-commerce Management | Pure Reach</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      body { font-family: 'Manrope', sans-serif; background-color: #f5f7f9; }
      h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; }
      .reveal { opacity: 0; transition: all 0.8s cubic-bezier(0.2, 0.6, 0.2, 1); will-change: transform, opacity; }
      .reveal-up { transform: translateY(30px); }
      .reveal.active { opacity: 1; transform: translate(0, 0); }
    </style>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="bg-surface text-on-surface antialiased">
    <nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm">
        <div class="flex justify-between items-center w-full px-8 py-4 max-w-full mx-auto">
            <div class="text-xl font-extrabold tracking-tighter text-slate-900">Pure Reach</div>
            <div class="hidden md:flex items-center gap-8">
                <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors" href="index.html">Home</a>
                <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors" href="services.html">Services</a>
                <a class="text-blue-600 font-bold border-b-2 border-blue-600 pb-1" href="ecommerce.html">E-commerce</a>
                <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors" href="support.html">Support</a>
            </div>
            <div class="flex items-center gap-4">
                <a class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-lg" href="#">Get Started</a>
            </div>
        </div>
    </nav>

    <main class="pt-24">
        <section class="px-8 py-16 md:py-24 max-w-7xl mx-auto reveal reveal-up">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div>
                    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6">Scale Your <span class="text-blue-600">E-commerce</span> Engine.</h1>
                    <p class="text-lg text-slate-600 mb-8 max-w-xl">AI-powered efficiency with human-directed strategy for high-growth brands.</p>
                </div>
                <div class="relative reveal reveal-up" style="transition-delay: 0.2s;">
                    <div class="bg-white rounded-2xl p-6 shadow-xl border border-slate-100">
                        <p class="text-lg font-bold">Pure ReachcDashboard</p>
                        <div class="h-24 bg-slate-50 mt-4 rounded-xl flex items-end p-2 gap-1">
                            <div class="w-full bg-blue-600 h-3/4 rounded-t-sm"></div>
                            <div class="w-full bg-blue-600 h-full rounded-t-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) { entry.target.classList.add("active"); }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll(".reveal").forEach((el) => observer.observe(el));
        });
    </script>
</body>
</html>
